    <title>Galería de Cursos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

                    <li class="nav-item">

                    </li>

                        const user = JSON.parse(sessionStorage.getItem('aluSesion'));
                        if (user && user.rol === 'admin') {

                    <li class="nav-item"><button class="btn btn-link nav-link" onclick="logout()">Salir</button></li>
