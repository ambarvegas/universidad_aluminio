<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Académico - Universidad del Aluminio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; }
    </style>
</head>
<body class="bg-light">
    <div class="card shadow-lg login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">Universidad del Aluminio</h2>
            <p class="text-muted">Ingresa a tu cuenta</p>
        </div>
        <form id="login-form">
            <div class="mb-3">
                <label class="form-label">Cédula</label>
                <input type="text" id="login-id" class="form-control" required placeholder="Ej: 25482938">
            </div>
            <div class="mb-3">
                <label class="form-label">Clave</label>
                <input type="password" id="login-pass" class="form-control" required placeholder="•••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
            <div id="login-error" class="text-danger small mt-2 text-center" style="display:none;">
                Cédula o clave incorrecta.
            </div>
            <hr>
            <div class="text-center">
                <button type="button" class="btn btn-link btn-sm" data-bs-toggle="modal" data-bs-target="#registroModal">Solicitar Nueva Cuenta</button>
            </div>
        </form>
    </div>

    <!-- Modal de Auto-Registro -->
    <div class="modal fade" id="registroModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form onsubmit="event.preventDefault(); window.solicitarRegistro(
                    document.getElementById('reg-id').value,
                    document.getElementById('reg-nombre').value,
                    document.getElementById('reg-pass').value,
                    document.getElementById('reg-cargo').value
                )">
                    <div class="modal-header"><h5 class="modal-title">Formulario de Solicitud</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <input type="text" id="reg-id" class="form-control mb-2" placeholder="Cédula de Identidad" required>
                        <input type="text" id="reg-nombre" class="form-control mb-2" placeholder="Nombre Completo" required>
                        <input type="password" id="reg-pass" class="form-control mb-2" placeholder="Elija una contraseña" required>
                        <label class="small text-muted">Cargo o Perfil que aspira:</label>
                        <select id="reg-cargo" class="form-select mb-3">
                            <option value="asesor_ventas">Asesor de Ventas</option>
                            <option value="proyectista">Proyectista / Diseño</option>
                            <option value="participante">Participante General</option>
                        </select>
                    </div>
                    <div class="modal-footer"><button class="btn btn-primary w-100">Enviar Solicitud</button></div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            
            if (window.login(id, pass)) {
                window.location.href = 'index.html';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
